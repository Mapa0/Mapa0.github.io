<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to TTR Fish Finder</title>

  <link rel="canonical" href="https://mapa0.github.io/ttr-fish-finder/">
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #19324a;
      background: linear-gradient(135deg, #c9efff, #eef9ed 52%, #fff4cf);

      display: grid;
      place-items: center;

      width: min(520px, calc(100% - 32px));

      font-weight: 800;
    }
  </style>
  <script>
    window.location.replace("https://mapa0.github.io/ttr-fish-finder/");
  </script>
</head>
<body>
  <main>
    <h1>Redirecting to TTR Fish Finder</h1>
    <p>If nothing happens, open <a href="https://mapa0.github.io/ttr-fish-finder/">TTR Fish Finder</a>.</p>
  </main>
</body>
</html>
